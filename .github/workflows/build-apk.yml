name: Build Atik Engine Pro APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Download Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q gradle-8.6-bin.zip
          echo "$PWD/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Find project and build APK
        run: |
          SETTINGS=$(find . -name "settings.gradle" | head -1)
          PROJECT_DIR=$(dirname "$SETTINGS")
          echo "Building from: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx1g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AtikEnginePro-Debug-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
